<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Objaverse Explorer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#0f1117;
    color:white;
    height:100vh;
    overflow:hidden;
}

.app{
    display:grid;
    grid-template-columns:450px 1fr;
    height:100vh;
}

.sidebar{
    border-right:1px solid #222;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.header{
    padding:15px;
    border-bottom:1px solid #222;
}

.search{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#1a1f2b;
    color:white;
    font-size:16px;
}

.filters{
    margin-top:10px;
}

.results{
    flex:1;
    overflow-y:auto;
    padding:10px;
}

.card{
    display:flex;
    gap:12px;
    background:#171b25;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
    cursor:pointer;
    transition:0.2s;
}

.card:hover{
    background:#232938;
}

.thumb{
    width:100px;
    height:100px;
    object-fit:cover;
    border-radius:8px;
}

.info{
    flex:1;
}

.title{
    font-weight:bold;
    margin-bottom:5px;
}

.meta{
    color:#999;
    font-size:12px;
    margin-top:4px;
}

.badge{
    display:inline-block;
    padding:4px 8px;
    border-radius:20px;
    background:#1f6feb;
    font-size:11px;
    margin-top:8px;
}

.viewer{
    display:flex;
    flex-direction:column;
    height:100%;
}

.preview{
    flex:1;
    background:black;
}

.preview iframe{
    width:100%;
    height:100%;
    border:none;
}

.details{
    height:260px;
    overflow:auto;
    padding:15px;
    border-top:1px solid #222;
    background:#151922;
}

.assetName{
    font-size:24px;
    font-weight:bold;
    margin-bottom:10px;
}

.row{
    margin-bottom:8px;
    color:#bbb;
}

.btn{
    background:#1f6feb;
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
}

.btn:hover{
    opacity:.9;
}
</style>

</head>

<body>

<div class="app">

```
<div class="sidebar">

    <div class="header">

        <input
            id="search"
            class="search"
            placeholder="Search bed, chair, spaceship..."
        >

        <div class="filters">

            <label>
                <input
                    type="checkbox"
                    id="downloadableOnly"
                >
                Downloadable Only
            </label>

        </div>

    </div>

    <div
        id="results"
        class="results"
    ></div>

</div>

<div class="viewer">

    <div class="preview">

        <iframe
            id="previewFrame"
        ></iframe>

    </div>

    <div
        id="details"
        class="details"
    >

        Select an asset to preview

    </div>

</div>
```

</div>

<script>

const resultsEl =
document.getElementById("results")

const previewFrame =
document.getElementById("previewFrame")

const detailsEl =
document.getElementById("details")

const searchInput =
document.getElementById("search")

const downloadableOnly =
document.getElementById("downloadableOnly")

let debounceTimer

searchInput.addEventListener(
    "input",
    () => {

        clearTimeout(debounceTimer)

        debounceTimer =
        setTimeout(
            searchAssets,
            250
        )

    }
)

downloadableOnly.addEventListener(
    "change",
    searchAssets
)

async function searchAssets(){

    const q =
        searchInput.value.trim()

    if(!q){

        resultsEl.innerHTML = ""

        return
    }

    try{

        const res =
        await fetch(
            `http://localhost:3000/search?q=${encodeURIComponent(q)}`
        )

        let data =
        await res.json()

        if(downloadableOnly.checked){

            data =
            data.filter(
                x => x.downloadable === 1
            )

        }

        renderResults(data)

    }catch(err){

        console.error(err)

    }

}

function renderResults(data){

    resultsEl.innerHTML =
    data.map(asset => `

        <div
            class="card"
            onclick='selectAsset(${JSON.stringify(asset)})'
        >

            <img
                class="thumb"
                src="${asset.thumbnail || ''}"
            >

            <div class="info">

                <div class="title">
                    ${asset.name || 'Unnamed'}
                </div>

                <div class="meta">
                    ${asset.category || ''}
                </div>

                <div class="meta">
                    Faces:
                    ${asset.face_count || 0}
                </div>

                <div class="meta">
                    Vertices:
                    ${asset.vertex_count || 0}
                </div>

                ${
                    asset.downloadable
                    ?
                    `<div class="badge">
                        Downloadable
                    </div>`
                    :
                    ""
                }

            </div>

        </div>

    `).join("")

}

window.selectAsset = function(asset){

    if(asset.embed_url){

        previewFrame.src =
        asset.embed_url

    }

    detailsEl.innerHTML = `

        <div class="assetName">
            ${asset.name}
        </div>

        <div class="row">
            UID: ${asset.uid}
        </div>

        <div class="row">
            Category: ${asset.category || "Unknown"}
        </div>

        <div class="row">
            Author: ${asset.author || "Unknown"}
        </div>

        <div class="row">
            Faces: ${asset.face_count || 0}
        </div>

        <div class="row">
            Vertices: ${asset.vertex_count || 0}
        </div>

        <div class="row">
            Textures: ${asset.texture_count || 0}
        </div>

        <br>

        <button
            class="btn"
            onclick="window.open('${asset.viewer_url}','_blank')"
        >
            Open in Sketchfab
        </button>

    `

}

</script>

</body>
</html>
