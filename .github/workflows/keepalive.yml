name: Keep Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping site
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://modelbase.onrender.com/ || true
          curl -s -o /dev/null -w "%{http_code}" https://modelbase.onrender.com/sitemap.xml || true
