# Render Blueprint for ModelBase
# Deploy instructions:
# 1. Push this repo to GitHub
# 2. Go to https://dashboard.render.com/blueprints
# 3. Connect your GitHub repo
# 4. Render will auto-detect this file and deploy

services:
  - type: web
    name: modelbase
    runtime: node
    plan: free
    buildCommand: cd web && npm install && npm run prebuild && npm run build
    startCommand: cd web && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SITE_URL
        value: https://modelbase.onrender.com
      - key: DATABASE_PATH
        value: ./db/objaverse.db
      - key: DB_DOWNLOAD_URL
        value: ""  # Set after uploading DB to GitHub Release
