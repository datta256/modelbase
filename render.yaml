# Render Blueprint for ModelBase
# Deploy instructions:
# 1. Push this repo to GitHub
# 2. Go to https://dashboard.render.com/blueprints
# 3. Connect your GitHub repo
# 4. Render will auto-detect this file and deploy

services:
  - type: web
    name: modelbase
    runtime: node
    plan: starter  # $7/month — upgrade to standard ($25) for 100k+ visits
    buildCommand: cd web && npm install && npm run build
    startCommand: cd web && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SITE_URL
        value: https://modelbase.onrender.com  # Change after custom domain
      - key: DATABASE_PATH
        value: ./db/objaverse.db
    disk:
      name: objaverse-db
      mountPath: /opt/render/project/src/web/db
      sizeGB: 5  # 1GB DB + room to grow
